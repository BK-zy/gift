<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Emotion of the Day</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: "Microsoft JhengHei", Arial, sans-serif;
            background-color: #f0f0f0;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        /* 容器固定比例，背景圖會自動填滿 */
        .page-container {
            position: relative;
            width: 100%;
            max-width: 1000px;
            aspect-ratio: 16 / 9;
            background-size: cover;
            background-position: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border-radius: 8px;
            overflow: hidden;
            display: none; /* 預設先隱藏所有頁面 */
        }
        /* 當前顯示的頁面 */
        .page-container.active {
            display: block;
        }

        /* 按鈕基礎樣式 */
        .btn {
            position: absolute;
            padding: 12px 30px;
            font-size: 18px;
            font-weight: bold;
            background-color: #ffffff;
            color: #333333;
            border: 2px solid #333333;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 2px 4px 10px rgba(0,0,0,0.1);
        }
        .btn:hover {
            background-color: #333333;
            color: #ffffff;
            transform: scale(1.05);
        }

        /* 右下角按鈕定位 */
        .bottom-right-btns {
            position: absolute;
            bottom: 5%;
            right: 5%;
            display: flex;
            gap: 15px;
        }
        /* 讓右下角內部按鈕不需要絕對定位 */
        .bottom-right-btns .btn {
            position: static;
        }

        /* --- 修正 1：第一頁 PLAY 按鈕調整為 57% --- */
        #page1 .play-btn {
            left: 50%;
            top: 57%; 
            transform: translateX(-50%);
        }
        #page1 .play-btn:hover {
            transform: translateX(-50%) scale(1.05);
        }

        /* --- 第三頁按鈕區域 --- */
        .emotion-area {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }
        /* 完全透明按鈕基礎設定 */
        .emotion-btn {
            position: absolute;
            background: transparent; 
            border: none;             
            cursor: pointer;          
            color: transparent;       
        }

        /* --- 修正 2：第三頁開心與難過按鈕調整為 10% --- */
        /* 左上：開心 */
        .btn-happy {
            left: 17%;
            top: 10%; 
            width: 30%;
            height: 30%;
        }
        /* 右上：難過 */
        .btn-sad {
            right: 17%;
            top: 10%; 
            width: 30%;
            height: 30%;
        }
        /* 左下：生氣 */
        .btn-angry {
            left: 17%;
            top: 55%;
            width: 30%;
            height: 30%;
        }
        /* 右下：隨機 */
        .btn-random {
            right: 17%;
            top: 55%;
            width: 30%;
            height: 30%;
        }

        /* --- 修正 3：第四頁與第五頁文字基礎樣式與個別定位 --- */
        .text-overlay {
            position: absolute;
            width: 50%;
            height: 50%;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: flex-start;
            color: #333;
        }
        
        /* 🎯 第四頁文字位置設定（可單獨修改） */
        .p4-text-position {
            top: 20%;   /* 距離頂部 */
            left: 45%;  /* 距離左邊 */
        }

        /* 🎯 第五頁文字位置設定（可單獨修改） */
        .p5-text-position {
            top: 8%;   /* 距離頂部 */
            left: 25%;  /* 距離左邊 */
        }

        .song-title {
            font-size: 32px;
            font-weight: bold;
            margin-bottom: 10px;
        }
        .song-artist {
            font-size: 20px;
            color: #666;
            margin-bottom: 20px;
        }
        .story-text {
            font-size: 25px;
            line-height: 1.6;
            white-space: pre-line;
        }
    </style>
</head>
<body>

    <div id="page1" class="page-container active" style="background-image: url('p1.png');">
        <button class="btn play-btn" onclick="goToPage('page2')">PLAY</button>
    </div>

    <div id="page2" class="page-container" style="background-image: url('p2.png');">
        <div class="bottom-right-btns">
            <button class="btn" onclick="goToPage('page3')">SKIP</button>
        </div>
    </div>

    <div id="page3" class="page-container" style="background-image: url('p3.png');">
        <div class="emotion-area">
            <button class="emotion-btn btn-happy" onclick="pickSong('happy')">開心</button>
            <button class="emotion-btn btn-sad" onclick="pickSong('sad')">難過</button>
            <button class="emotion-btn btn-angry" onclick="pickSong('angry')">生氣</button>
            <button class="emotion-btn btn-random" onclick="pickSong('random')">隨機</button>
        </div>
        <div class="bottom-right-btns">
            <button class="btn" onclick="goToPage('page2')">返回</button>
        </div>
    </div>

    <div id="page4" class="page-container" style="background-image: url('p4.png');">
        <div class="text-overlay p4-text-position">
            <div id="p4-title" class="song-title">歌名</div>
            <div id="p4-artist" class="song-artist">歌手</div>
        </div>
        <div class="bottom-right-btns">
            <button class="btn" onclick="goToPage('page5')">下一頁</button>
        </div>
    </div>

    <div id="page5" class="page-container" style="background-image: url('p5.png');">
        <div class="text-overlay p5-text-position">
            <div id="p5-story" class="story-text">這裡是這首歌對應的感性文字內容...</div>
        </div>
        <div class="bottom-right-btns">
            <button class="btn" onclick="goToPage('page4')">上一頁</button>
            <button class="btn" onclick="goToPage('page1')">首頁</button>
        </div>
    </div>

    <script>
        // 🎵 歌曲資料庫（可以自由修改這裡的文字、歌名、歌手）
        const songDatabase = [
            { id: 1, category: 'happy', title: '開心歌曲 1', artist: '歌手 A', story: '聽到這首歌，是不是讓你嘴角不自覺上揚呢？今天也是美好的一天！' },
            { id: 2, category: 'happy', title: '開心歌曲 2', artist: '歌手 B', story: '把煩惱都拋開，跟著這個節奏一起搖擺吧！' },
            { id: 3, category: 'sad',   title: '難過歌曲 3', artist: '歌手 C', story: '想哭的時候就哭出來吧，這首歌會陪著你慢慢復原。' },
            { id: 4, category: 'sad',   title: '難過歌曲 4', artist: '歌手 D', story: '文字無法言說的痛，就讓旋律幫你說出來。內耗也沒關係的。' },
            { id: 5, category: 'angry', title: '生氣歌曲 5', artist: '歌手 E', story: '把所有的不爽跟著重低音一起釋放出去吧！' },
            { id: 6, category: 'angry', title: '生氣歌曲 6', artist: '歌手 F', story: '撕開那些虛偽，這首歌就是你最強的宣洩出口。' }
        ];

        let currentSong = null;

        function goToPage(pageId) {
            document.querySelectorAll('.page-container').forEach(page => {
                page.classList.remove('active');
            });
            document.getElementById(pageId).classList.add('active');
        }

        function pickSong(emotion) {
            let filteredSongs = [];

            if (emotion === 'random') {
                filteredSongs = songDatabase;
            } else {
                filteredSongs = songDatabase.filter(song => song.category === emotion);
            }

            if (filteredSongs.length > 0) {
                const randomIndex = Math.floor(Math.random() * filteredSongs.length);
                currentSong = filteredSongs[randomIndex];

                document.getElementById('p4-title').innerText = currentSong.title;
                document.getElementById('p4-artist').innerText = currentSong.artist;
                document.getElementById('p5-story').innerText = currentSong.story;

                goToPage('page4');
            }
        }
    </script>
</body>
</html>
